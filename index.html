<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Khủng Long</title>
<style>
body{
  margin:0;
  background:#f4f4f4;
  overflow:hidden;
  font-family:sans-serif;
}

#game{
  width:800px;
  height:200px;
  border:2px solid black;
  margin:50px auto;
  background:white;
  position:relative;
}

#dino{
  width:40px;
  height:40px;
  background:green;
  position:absolute;
  bottom:0;
  left:50px;
}

#cactus{
  width:20px;
  height:40px;
  background:darkgreen;
  position:absolute;
  bottom:0;
  right:-20px;
}

#score{
  position:absolute;
  top:10px;
  right:20px;
  font-size:20px;
}
</style>
</head>

<body>

<div id="game">
<div id="dino"></div>
<div id="cactus"></div>
<div id="score">0</div>
</div>

<script>

let dino = document.getElementById("dino");
let cactus = document.getElementById("cactus");
let scoreText = document.getElementById("score");

let jumping = false;
let score = 0;

document.addEventListener("keydown", function(e){
if(e.code === "Space"){
jump();
}
});

function jump(){

if(jumping) return;

jumping = true;
let position = 0;

let up = setInterval(()=>{

if(position >= 100){
clearInterval(up);

let down = setInterval(()=>{

if(position <= 0){
clearInterval(down);
jumping = false;
}

position -= 5;
dino.style.bottom = position + "px";

},20);

}

position += 5;
dino.style.bottom = position + "px";

},20);

}

function moveCactus(){

let cactusPosition = 800;

let move = setInterval(()=>{

cactusPosition -= 5;
cactus.style.right = (800 - cactusPosition) + "px";

if(cactusPosition < -20){
cactusPosition = 800;
score++;
scoreText.innerText = score;
}

let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));

if(cactusPosition > 50 && cactusPosition < 90 && dinoBottom < 40){
alert("Game Over! Điểm: " + score);
location.reload();
}

},20);

}

moveCactus();

</script>

</body>
</html>
